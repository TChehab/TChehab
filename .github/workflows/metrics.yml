name: GitHub Metrics

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: TChehab
          template: classic
          base: header, community
          config_timezone: America/Sao_Paulo

      - name: Languages Pie Chart
        uses: lowlighter/metrics@latest
        with:
          filename: assets/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: TChehab
          base: ""
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_threshold: 0%
          config_timezone: America/Sao_Paulo

  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Generate Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: TChehab
          outputs: |
            assets/snake.svg?palette=github-dark
            assets/snake.gif?color_snake=58A6FF&color_dots=#0d1117,#1f3a5f,#2e6da4,#58A6FF,#79c0ff

      - name: Commit Snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/snake.svg assets/snake.gif
          git diff --cached --quiet || git commit -m "chore: update contribution snake"
          git push
